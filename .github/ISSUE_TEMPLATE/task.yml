name: Project task
description: Plan one focused, verifiable improvement
title: ""
labels: []
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What needs attention, and why does it matter?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Intended outcome
      description: Describe the observable result, not the implementation alone.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Relevant context
      description: List files, notebooks, data sources, errors, or examples.
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints and non-goals
      description: State what must be preserved or intentionally excluded.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Provide a checklist of conditions that define completion.
      value: |
        - [ ]
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: List commands, tests, or evidence expected before review.
    validations:
      required: true
